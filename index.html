<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Videoserver Laden...</title>
  <script>
    // Haalt de link vlijmscherp op via Dontpad (onblokkeerbaar)
    fetch("https://allorigins.win" + encodeURIComponent("http://dontpad.com"))
      .then(response => response.json())
      .then(data => {
        let url = data.contents.trim();
        if (url && url.startsWith("http")) {
          window.location.replace(url);
        } else {
          document.body.innerHTML = "⚠️ De videoserver staat momenteel uit. Start het script in Termux.";
        }
      })
      .catch(() => {
        document.body.innerHTML = "❌ Verbindingsfout. Probeer de pagina te vernieuwen.";
      });
  </script>
</head>
<body style="font-family:sans-serif; text-align:center; margin-top:50px;">
  <h2>⏳ Bezig met doorsturen naar de videoserver van het koor...</h2>
  <p>Een moment geduld alstublieft.</p>
</body>
</html>
